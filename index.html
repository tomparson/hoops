<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#0E1116" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#F3F5F8" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Hoops" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="manifest" href="manifest.json" />
<title>Hoops · Training Tracker</title>
<style>
  :root{
    --bg:#0E1116; --surface:#161B22; --surface2:#1F2630; --surface3:#2A323D;
    --border:#2A323D; --text:#F5F7FA; --muted:#8A93A2; --faint:#5A6275;
    --muted2:#6B7480;
    --accent:#FF6B35; --accent2:#FFA600; --accentSoft:rgba(255,107,53,.14);
    --success:#34D399; --successSoft:rgba(52,211,153,.14);
    --blue:#3B82F6; --danger:#F2545B;
    --radius:18px; --radius-sm:12px;
    --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
    color-scheme:light dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;
    -webkit-overflow-scrolling:touch}
  html{scroll-padding-top:calc(var(--safe-top) + 112px)}
  body{max-width:560px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  h1,h2,h3,h4,p{margin:0}
  .hidden{display:none!important}

  /* ---------- App shell ---------- */
  #app{padding:calc(var(--safe-top) + 8px) 16px calc(96px + var(--safe-bottom)) 16px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin:8px 2px 18px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.02em}
  .brand .ball{font-size:26px;line-height:1;flex:none;display:inline-flex;align-items:center;
    filter:drop-shadow(0 2px 6px rgba(226,84,31,.45))}
  .topbar .date{color:var(--muted);font-size:13px;font-weight:600}

  /* ---------- Cards ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .card + .card{margin-top:14px}
  .section-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:24px 4px 12px}
  .section-label:first-child{margin-top:6px}

  /* ---------- Home hero ---------- */
  .hero{background:linear-gradient(155deg,#23170E,#161B22 60%);border:1px solid var(--border);
    border-radius:var(--radius);padding:22px;position:relative;overflow:hidden}
  .hero .glow{position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,107,53,.35),transparent 70%);filter:blur(4px)}
  .hero h2{font-size:15px;color:var(--muted);font-weight:600;position:relative}
  .hero .big{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-top:4px;position:relative}
  .hero .sub{color:var(--muted);font-size:14px;margin-top:6px;position:relative}
  .btn-primary{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:linear-gradient(135deg,#FF7A3C,#F2541C);color:#fff;font-size:18px;font-weight:800;
    padding:18px;border-radius:16px;margin-top:18px;position:relative;letter-spacing:-.01em;
    box-shadow:0 8px 22px rgba(226,84,31,.35);transition:transform .08s ease}
  .btn-primary:active{transform:scale(.975)}
  .btn-ghost{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--surface2);color:var(--text);font-size:16px;font-weight:700;padding:15px;border-radius:14px;
    border:1px solid var(--border);transition:transform .08s}
  .btn-ghost:active{transform:scale(.98)}

  /* ---------- Stat grid ---------- */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat-grid.three{grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat-grid.three .stat{padding:14px 10px}
  .stat-grid.three .num{font-size:23px}
  .stat-grid.three .num .unit{font-size:12px}
  .stat-grid.three .lbl{font-size:11px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
  .stat .num{font-size:28px;font-weight:800;letter-spacing:-.03em;display:flex;align-items:baseline;gap:5px}
  .stat .num .unit{font-size:14px;color:var(--muted);font-weight:700}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
  .stat .num.accent{color:var(--accent2)}
  .stat .num.green{color:var(--success)}

  /* ---------- Phase preview list (home) ---------- */
  .phase-row{display:flex;align-items:center;gap:14px;padding:14px 4px}
  .phase-row + .phase-row{border-top:1px solid var(--border)}
  .phase-ico{width:42px;height:42px;border-radius:12px;background:var(--surface2);display:flex;
    align-items:center;justify-content:center;font-size:21px;flex:none}
  .phase-row .meta{flex:1;min-width:0}
  .phase-row .meta .nm{font-weight:700;font-size:16px}
  .phase-row .meta .ds{color:var(--muted);font-size:13px;margin-top:2px}
  .phase-row .dur{color:var(--muted);font-size:13px;font-weight:700;flex:none}

  /* ---------- Session ---------- */
  .sess-head{position:sticky;top:0;z-index:40;background:rgba(14,17,22,.86);backdrop-filter:blur(12px);
    margin:0 -16px;padding:calc(var(--safe-top) + 10px) 16px 12px;border-bottom:1px solid var(--border)}
  .sess-head .row1{display:flex;align-items:center;justify-content:space-between}
  .sess-head .ttl{font-weight:800;font-size:18px;letter-spacing:-.02em}
  .sess-head .timer{font-variant-numeric:tabular-nums;color:var(--muted);font-weight:700;font-size:14px}
  .xbtn{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted)}
  .progress-wrap{margin-top:12px}
  .progress-bar{height:8px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#FF7A3C,#FFA600);border-radius:99px;width:0;transition:width .35s cubic-bezier(.2,.8,.2,1)}
  .progress-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:12px;color:var(--muted);font-weight:600}

  .phase-block{margin-top:22px;scroll-margin-top:calc(var(--safe-top) + 112px)}
  .phase-title{display:flex;align-items:center;gap:10px;margin:0 2px 12px}
  .phase-title .em{font-size:20px}
  .phase-title .tx{font-weight:800;font-size:17px;letter-spacing:-.01em}
  .phase-title .cnt{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700;
    background:var(--surface2);padding:3px 9px;border-radius:99px}

  .act{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:border-color .2s,background .2s;scroll-margin-top:calc(var(--safe-top) + 112px)}
  .act.done{border-color:rgba(52,211,153,.4);background:linear-gradient(180deg,rgba(52,211,153,.06),transparent)}
  .act-top{display:flex;align-items:flex-start;gap:13px}
  .act-info{flex:1;min-width:0}
  .act-name{font-weight:700;font-size:16.5px;letter-spacing:-.01em;line-height:1.25}
  .act-note{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.4}
  .act-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--accent2);background:var(--accentSoft);
    padding:2px 8px;border-radius:99px;margin-top:8px;letter-spacing:.02em}
  .check{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--surface3);flex:none;display:flex;
    align-items:center;justify-content:center;transition:all .18s;font-size:18px;color:transparent}
  .check.on{background:var(--success);border-color:var(--success);color:#0E1116}
  .check:active{transform:scale(.9)}
  .act-btns{display:flex;align-items:center;gap:10px;flex:none}
  .ibtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--surface3);background:var(--surface);
    color:var(--muted);font-size:15px;font-weight:700;font-style:italic;font-family:Georgia,"Times New Roman",serif;
    display:flex;align-items:center;justify-content:center;transition:transform .12s,background .15s,color .15s;flex:none}
  .ibtn:active{transform:scale(.88);background:var(--surface2);color:var(--text)}

  /* counter control */
  .counter{display:flex;align-items:center;gap:12px;margin-top:16px}
  .cbtn{width:60px;height:60px;border-radius:16px;background:var(--surface2);border:1px solid var(--border);
    font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--text);
    transition:transform .06s,background .15s;flex:none}
  .cbtn:active{transform:scale(.92)}
  .cbtn.plus{background:linear-gradient(135deg,#FF7A3C,#F2541C);border-color:transparent;color:#fff;
    box-shadow:0 6px 16px rgba(226,84,31,.32)}
  .cbtn.big{flex:1}
  .cval{flex:1;text-align:center}
  .cval .v{font-size:34px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .cval .v .tgt{font-size:17px;color:var(--muted);font-weight:700}
  .cval .lab{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}

  /* spots */
  .spots{display:flex;gap:8px;margin-top:16px}
  .spot{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 4px;
    text-align:center;transition:all .15s}
  .spot.full{background:var(--successSoft);border-color:rgba(52,211,153,.4)}
  .spot .sn{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .spot .sv{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .spot .sv .st{font-size:12px;color:var(--muted)}
  .spot:active{transform:scale(.94)}

  /* timer activity start */
  .timer-start{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:16px;
    background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:15px;font-weight:700;font-size:16px}
  .timer-start.done{background:var(--successSoft);border-color:rgba(52,211,153,.35);color:var(--success)}
  .timer-start:active{transform:scale(.98)}

  /* large CTA buttons inside Train cards — sized big for tapping mid-workout */
  .cta-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;
    margin-top:16px;min-height:140px;padding:18px;border:1px solid var(--border);border-radius:16px;
    background:var(--surface2);font-weight:800;font-size:21px;color:var(--text);letter-spacing:-.01em;text-align:center;
    transition:transform .08s,background .15s,border-color .15s}
  .cta-btn:active{transform:scale(.98)}
  .cta-btn.done{background:var(--successSoft);border-color:rgba(52,211,153,.4);color:var(--success)}
  .cta-btn .cta-sub{font-size:13.5px;font-weight:600;color:var(--muted)}
  .cta-btn.done .cta-sub{color:var(--success);opacity:.85}
  .spot-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
  .spot-btn{display:flex;align-items:center;justify-content:space-between;width:100%;min-height:68px;padding:14px 18px;
    border:1px solid var(--border);border-radius:14px;background:var(--surface2);
    transition:transform .08s,background .15s,border-color .15s}
  .spot-btn:active{transform:scale(.985)}
  .spot-btn.done{background:var(--successSoft);border-color:rgba(52,211,153,.4)}
  .spot-btn .sb-l{font-weight:700;font-size:16.5px;color:var(--text)}
  .spot-btn .sb-t{font-weight:800;font-size:16px;color:var(--muted);font-variant-numeric:tabular-nums}
  .spot-btn.done .sb-t{color:var(--success)}
  .sw-spot{font-size:36px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
  .sw-step{font-size:13px;font-weight:700;color:var(--muted2);margin-top:8px;letter-spacing:.02em}
  .sw-label{font-size:14px;font-weight:800;letter-spacing:.12em;color:var(--accent);margin-top:16px}
  .sw-time{font-size:88px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.04em;line-height:1;margin-top:10px}
  .sw-hint{font-size:14px;color:var(--muted);margin:16px auto 0;font-weight:600;max-width:240px}
  .ft-row{display:flex;gap:10px;margin-top:16px}
  .ft-stat{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}
  .ft-stat .fv{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
  .ft-stat .fl{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
  .ft-stat.pct .fv{color:var(--accent2)}
  .ft-ctrls{display:flex;gap:10px;margin-top:10px}

  .finish-bar{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;
    padding:12px 16px calc(12px + var(--safe-bottom));background:linear-gradient(0deg,var(--bg) 70%,transparent);
    z-index:50}

  /* ---------- Timer overlay ---------- */
  .overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;
    padding:calc(var(--safe-top) + 16px) 20px calc(24px + var(--safe-bottom));max-width:560px;margin:0 auto}
  .ov-head{display:flex;align-items:center;justify-content:space-between}
  .ov-head .nm{font-weight:700;font-size:16px;color:var(--muted)}
  .ring-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .ring{position:relative;width:264px;height:264px}
  .ring svg{transform:rotate(-90deg)}
  .ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .phase{font-size:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
  .ring .phase.work{color:var(--accent)}
  .ring .phase.rest{color:var(--blue)}
  .ring .tnum{font-size:74px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.04em;line-height:1}
  .ring .sets{font-size:14px;color:var(--muted);font-weight:700;margin-top:10px}
  .ov-ctrls{display:flex;gap:12px;margin-top:10px}
  .ov-ctrls button{flex:1;padding:18px;border-radius:16px;font-weight:800;font-size:16px;background:var(--surface2);border:1px solid var(--border)}
  .ov-ctrls .main{background:linear-gradient(135deg,#FF7A3C,#F2541C);color:#fff;border-color:transparent;flex:2}

  /* ---------- History ---------- */
  .chart{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px}
  .chart .bar{flex:1;background:linear-gradient(180deg,#FF7A3C,#F2541C);border-radius:6px 6px 3px 3px;min-height:4px;position:relative;opacity:.9}
  .chart .bar:last-child{opacity:1;box-shadow:0 0 0 2px rgba(255,166,0,.4)}
  .chart-x{display:flex;gap:6px;margin-top:6px}
  .chart-x span{flex:1;text-align:center;font-size:10px;color:var(--muted);font-weight:600}
  /* per-drill time charts (home) — shorter bar = faster; fastest highlighted */
  .chart-card{padding:14px 16px}
  .chart-card + .chart-card{margin-top:12px}
  .chart-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:12px}
  .chart-head .ct{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
  .chart-head .cmeta{font-size:11.5px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;flex:none}
  .tchart{display:flex;align-items:flex-end;gap:6px;height:88px}
  .tbar{flex:1;background:var(--surface3);border-radius:5px 5px 2px 2px;min-height:5px;transition:height .3s}
  .tbar.best{background:linear-gradient(180deg,#34D399,#0E9C68)}
  .hist-item{display:flex;align-items:center;gap:14px;padding:15px 0}
  .hist-item + .hist-item{border-top:1px solid var(--border)}
  .hist-ring{width:46px;height:46px;flex:none;position:relative}
  .hist-ring .pc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .hist-meta{flex:1;min-width:0}
  .hist-meta .d{font-weight:700;font-size:15px}
  .hist-meta .s{color:var(--muted);font-size:12.5px;margin-top:2px}
  .hist-meta .s.times{color:var(--accent2);font-weight:600}
  .hist-chevron{color:var(--faint);font-size:20px}
  .hist-del{width:38px;height:38px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;
    background:var(--surface2);border:1px solid var(--border);color:var(--muted2);transition:transform .12s,background .15s,color .15s,border-color .15s}
  .hist-del:active{transform:scale(.88);background:rgba(242,84,91,.15);border-color:rgba(242,84,91,.45);color:var(--danger)}
  .hist-del svg{width:17px;height:17px;display:block}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .em{font-size:46px;margin-bottom:14px}
  .empty p{font-size:15px;line-height:1.5}

  .week-dots{display:flex;justify-content:space-between;margin-top:14px}
  .wd{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}
  .wd .dot{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:13px}
  .wd.on .dot{background:var(--success);border-color:var(--success);color:#0E1116}
  .wd.today .dot{box-shadow:0 0 0 2px var(--accent)}
  .wd .lab{font-size:11px;color:var(--muted);font-weight:700}

  /* ---------- Bottom nav ---------- */
  .nav{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;z-index:60;
    background:rgba(18,22,28,.94);backdrop-filter:blur(14px);border-top:1px solid var(--border);
    display:flex;padding:8px 8px calc(8px + var(--safe-bottom))}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;color:var(--muted);font-size:11px;font-weight:700}
  .nav button.on{color:var(--accent)}
  .nav .ico{font-size:22px;line-height:1}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:24px 20px calc(24px + var(--safe-bottom));
    border-top:1px solid var(--border)}
  .modal h3{font-size:19px;font-weight:800;margin-bottom:8px}
  .modal p{color:var(--muted);font-size:14.5px;line-height:1.5;margin-bottom:20px}
  .modal .acts{display:flex;flex-direction:column;gap:10px}
  .modal .danger{background:var(--danger);color:#fff;border-radius:14px;padding:16px;font-weight:800;font-size:16px;text-align:center}
  .modal .neutral{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;font-weight:700;font-size:16px;text-align:center}

  /* ---------- Info bottom sheet ---------- */
  .sheet-bg{position:fixed;inset:0;z-index:130;background:rgba(0,0,0,0);display:flex;align-items:flex-end;justify-content:center;transition:background .25s}
  .sheet-bg.show{background:rgba(0,0,0,.62)}
  .sheet{background:var(--surface);width:100%;max-width:560px;border-radius:24px 24px 0 0;
    padding:8px 22px calc(24px + var(--safe-bottom));border-top:1px solid var(--border);
    transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.85,.25,1);touch-action:none;will-change:transform}
  .sheet-bg.show .sheet{transform:translateY(0)}
  .sheet-grab{width:42px;height:5px;border-radius:99px;background:var(--surface3);margin:8px auto 18px}
  .sheet-emoji{width:54px;height:54px;border-radius:16px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
  .sheet h3{font-size:21px;font-weight:800;text-align:center;letter-spacing:-.02em;margin-bottom:4px}
  .sheet-sub{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);text-align:center;margin-bottom:14px}
  .sheet ul{list-style:none;padding:0;margin:0 0 18px}
  .sheet li{position:relative;padding:11px 0 11px 26px;font-size:15.5px;line-height:1.45;border-top:1px solid var(--border)}
  .sheet li:first-child{border-top:none}
  .sheet li:before{content:"";position:absolute;left:4px;top:19px;width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .sheet-close{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:15px;font-weight:800;font-size:16px;color:var(--text)}
  .sheet-close:active{transform:scale(.98)}

  .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
    background:var(--surface3);color:var(--text);padding:12px 20px;border-radius:99px;font-weight:700;font-size:14px;
    z-index:200;opacity:0;transition:all .3s;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  .pulse{animation:pop .28s ease}

  /* ---------- Light mode (mirrors device setting) — high contrast for sunlight ---------- */
  @media (prefers-color-scheme: light){
    :root{
      --bg:#F3F5F8;          /* bright page so it stays legible in glare */
      --surface:#FFFFFF;     /* white cards lift off the page */
      --surface2:#E7ECF3;
      --surface3:#D3DAE5;
      --border:#BAC4D2;      /* firm borders so cards read in bright light */
      --text:#0A0E14;        /* near-black for max contrast */
      --muted:#46505E;       /* dark enough to read outdoors */
      --muted2:#5E6876;
      --faint:#8A94A3;
      --accent:#E2541F;      /* deeper orange than the dark-mode tone */
      --accent2:#A8530B;     /* dark amber — readable on white (gold isn't) */
      --accentSoft:rgba(226,84,31,.12);
      --success:#0E9C68;     /* darkened green for contrast on white */
      --successSoft:rgba(14,156,104,.14);
      --blue:#2563EB;
      --danger:#DC2626;
    }
    /* Cards get a soft lift so they separate from the page in bright light */
    .card,.stat,.act,.hero{box-shadow:0 1px 3px rgba(16,24,40,.07),0 1px 2px rgba(16,24,40,.04)}
    .hero{background:linear-gradient(155deg,#FFF3EA,#FFFFFF 62%)}
    .sess-head{background:rgba(243,245,248,.86)}
    .nav{background:rgba(255,255,255,.92)}
    /* keep checked/win states crisp: dark glyph on the bright accent fills */
    .check.on,.wd.on .dot{color:#FFFFFF}
  }
</style>
</head>
<body>
<div id="app"></div>
<nav class="nav" id="nav"></nav>
<div id="overlayRoot"></div>
<div id="modalRoot"></div>
<div id="infoRoot"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* =====================================================================
   ROUTINE DEFINITION
   ===================================================================== */
const ROUTINE = [
  { id:"warmup", name:"Warm-up", emoji:"🤸", dur:"5 min", acts:[
    { id:"stretch", type:"check", name:"Dynamic stretches", note:"Leg swings, lunges, ankle circles" },
    { id:"jog",     type:"check", name:"Jog the park perimeter" },
  ]},
  { id:"agility", name:"Agility", emoji:"⚡", dur:"15 min", acts:[
    { id:"slides",     type:"timer", name:"Defensive slides", note:"Baseline to sideline, low stance",
      sets:4, work:30, rest:30 },
    { id:"sprintback", type:"timer", name:"Sprint–backpedal", note:"Between the lines, explode and recover",
      sets:4, work:30, rest:30 },
    { id:"closeouts",  type:"task", name:"Closeout reps", doneLabel:"6 reps",
      note:"Sprint under basket → 3pt line, chop feet low, slide two steps. Rest 30s." },
  ]},
  { id:"dribbling", name:"Dribbling", emoji:"🏀", dur:"15 min", acts:[
    { id:"pound",    type:"timer", name:"Pound dribbles", note:"Hard as you can — eyes up",
      sets:4, work:45, rest:15, setLabel:["Right hand","Left hand","Right hand","Left hand"] },
    { id:"downback", type:"stopwatch", name:"Baseline to halfway & back", target:6, unit:"reps",
      note:"Baseline → halfway line and back · 3 trips per hand — time all 6" },
    { id:"crossover",type:"stopwatch", name:"Crossover", target:10, unit:"reps",
      note:"At a cone or water bottle · alternate starting hand — time all 10" },
    { id:"speed",    type:"stopwatch", name:"Speed dribbles", target:6, unit:"lengths",
      note:"Both hands, alternating · full-court length — time all 6" },
  ]},
  { id:"shooting", name:"Shooting", emoji:"🎯", dur:"20 min", acts:[
    { id:"form",    type:"stopwatch", name:"Form shots", target:20, makes:true,
      note:"1m from basket · one hand · perfect arc — time how long to make 20" },
    { id:"spots",   type:"spotstime", name:"Spot shooting", makes:true, spotCount:5, perSpot:5,
      spotLabels:["Near right","Right wing","Top","Left wing","Near left"],
      note:"5 spots in a semicircle, starting near right — time each to 5 makes" },
    { id:"rebound", type:"stopwatch", name:"Rebound lay-ups", target:15, makes:true,
      note:"Self-pass off the backboard, catch, lay it up — time how long to do 15" },
  ]},
];

const ALL_ACTS = ROUTINE.flatMap(p => p.acts.map(a => ({...a, phase:p.id})));
const TOTAL_ACTS = ALL_ACTS.length;

/* ELI5 "how to do it" bullets — shown in the info sheet. Warm-up drills have none. */
const INFO = {
  slides: ["Bend your knees and get low, like sitting on an invisible chair","Spread your feet wide and stay on the balls of your feet","Push off one foot to slide sideways — never cross your feet over","Keep your chest up and hands out wide","Slide one way, then back the other way"],
  sprintback: ["Sprint forward as fast as you can to a line","At the line, stop and run backwards (backpedal) to the start","Stay low going backwards so you don't fall","Pump your arms in both directions","It's about quick, explosive changes of direction"],
  closeouts: ["Start standing under the basket","Sprint out towards the 3-point line","As you get close, take quick little choppy steps to slow down","Drop into a low stance with your hands up, like guarding a shooter","Slide sideways two steps, then jog back and go again"],
  pound: ["Bounce the ball hard into the floor, over and over","Use just one hand at a time","Keep your head up and eyes forward — don't look at the ball","Pound it about waist height, as hard as you can","Switch hands each set — 2 sets per hand"],
  downback: ["Start on the baseline with the ball","Dribble fast to the halfway line and straight back = 1 rep","Use the SAME hand for the whole rep","Do 3 reps with each hand — 6 in total","Start the timer and try to beat your time each session"],
  crossover: ["Put a cone or water bottle on the ground","Dribble up and do a move to switch the ball to your other hand","Mix it up: crossover, between-legs, behind-back","Alternate which hand you start with each time","Do 10 in total and time how long they take — stay low, eyes up"],
  speed: ["Push the ball out in front and run the full court length","Alternate hands as you go — right, left, right","Dribble a little higher and further ahead so you can move fast","Keep your eyes up, not on the ball","One full length = one rep; do 6 and time them all"],
  form: ["Stand really close — about one big step from the hoop","Shoot one-handed with a high, soft arc (other hand just rests)","Start the timer and shoot until you make 20","Only makes count — chase your misses quickly","Try to beat your time each session"],
  spots: ["Set up 5 spots in a semicircle around the basket","Always start on the near right (as you look at the hoop)","Work around: near right → right wing → top → left wing → near left","At each spot, start its timer and shoot until you make 5","Beating your time at each angle shows where you're strongest"],
  rebound: ["Throw the ball off the backboard to yourself","Catch it like a rebound and lay it straight back up","Start the timer and do 15 lay-ups as fast as you can","Use the backboard each time; alternate sides if you like","Try to lower your time each session"],
};

const TRASH_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`;

/* =====================================================================
   STORAGE
   ===================================================================== */
const LS_SESSIONS = "bb_sessions_v1";
const LS_CURRENT  = "bb_current_v1";

function loadSessions(){ try{ return JSON.parse(localStorage.getItem(LS_SESSIONS)) || []; }catch(e){ return []; } }
function saveSessions(s){ localStorage.setItem(LS_SESSIONS, JSON.stringify(s)); }
function loadCurrent(){ try{ return JSON.parse(localStorage.getItem(LS_CURRENT)) || null; }catch(e){ return null; } }
function saveCurrent(c){ if(c) localStorage.setItem(LS_CURRENT, JSON.stringify(c)); else localStorage.removeItem(LS_CURRENT); }

/* =====================================================================
   STATE
   ===================================================================== */
let view = "home";           // home | session | history
let current = loadCurrent(); // active session or null
let activeTimer = null;      // timer overlay state

/* =====================================================================
   SESSION MODEL
   blank progress per activity
   ===================================================================== */
function blankProgress(){
  const p = {};
  for(const a of ALL_ACTS){
    if(a.type==="check"||a.type==="task") p[a.id] = { done:false };
    if(a.type==="timer")     p[a.id] = { done:false, setsDone:0 };
    if(a.type==="stopwatch") p[a.id] = { done:false, seconds:null };
    if(a.type==="spotstime") p[a.id] = { done:false, spots:Array(a.spotCount).fill(null) };
  }
  return p;
}
function newSession(){
  return { startedAt: Date.now(), date: todayKey(), progress: blankProgress() };
}

/* activity completion helpers */
function isActDone(a, pr){
  const d = pr[a.id];
  if(!d) return false;
  if(a.type==="check"||a.type==="task") return !!d.done;
  if(a.type==="timer")     return d.done || d.setsDone >= a.sets;
  if(a.type==="stopwatch") return d.done || d.seconds != null;
  if(a.type==="spotstime") return d.done || d.spots.every(v=>v != null);
  return false;
}
function doneCount(pr){ return ALL_ACTS.filter(a=>isActDone(a,pr)).length; }
function sessionMakes(pr){
  let m=0;
  for(const a of ALL_ACTS){
    if(!a.makes) continue;
    const d = pr[a.id]; if(!d) continue;
    if(a.type==="stopwatch"){ if(d.seconds != null) m += a.target; }
    if(a.type==="spotstime"){ m += d.spots.filter(v=>v != null).length * a.perSpot; }
  }
  return m;
}

/* =====================================================================
   DATE HELPERS
   ===================================================================== */
function todayKey(d=new Date()){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function fmtFullDate(ts){ return new Date(ts).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}); }
function fmtDur(ms){ const m=Math.floor(ms/60000); return m<60? m+" min" : Math.floor(m/60)+"h "+(m%60)+"m"; }
function fmtClock(s){ const m=Math.floor(s/60),x=s%60; return m+":"+String(x).padStart(2,"0"); }

/* monday (week start) key for a given date */
function weekKey(d){ const x=new Date(d); x.setHours(0,0,0,0); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return todayKey(x); }
/* streak = consecutive weeks (ending this week or last) with >=1 session */
function computeStreak(sessions){
  if(!sessions.length) return 0;
  const weeks = new Set(sessions.map(s=>weekKey(new Date(s.startedAt))));
  let streak=0; let d=new Date();
  // allow the streak to count from this week or last week (one week of grace)
  if(!weeks.has(weekKey(d))){ d.setDate(d.getDate()-7); if(!weeks.has(weekKey(d))) return 0; }
  while(weeks.has(weekKey(d))){ streak++; d.setDate(d.getDate()-7); }
  return streak;
}
function weekHasSession(sessions){ return sessions.some(s=>weekKey(new Date(s.startedAt))===weekKey(new Date())); }
function sessionsThisWeek(sessions){
  const now=new Date(); const day=(now.getDay()+6)%7; // monday=0
  const monday=new Date(now); monday.setHours(0,0,0,0); monday.setDate(now.getDate()-day);
  return sessions.filter(s=> new Date(s.startedAt) >= monday).length;
}

/* =====================================================================
   AUDIO CUES (Web Audio)
   ===================================================================== */
let audioCtx=null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); }
function beep(freq=880, dur=0.15, type="sine", vol=0.25){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
function cueWork(){ beep(660,0.12,"sine"); setTimeout(()=>beep(990,0.18,"sine"),130); }
function cueRest(){ beep(440,0.22,"triangle"); }
function cueDone(){ beep(784,0.12); setTimeout(()=>beep(988,0.12),130); setTimeout(()=>beep(1318,0.25),260); }
function cueTick(){ beep(1100,0.05,"square",0.12); }
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

/* =====================================================================
   RENDER ROOT
   ===================================================================== */
const app = document.getElementById("app");
function render(){
  if(view==="session" && current) renderSession();
  else if(view==="history") renderHistory();
  else renderHome();
  renderNav();
}

/* =====================================================================
   HOME
   ===================================================================== */
function renderHome(){
  const sessions = loadSessions();
  const streak = computeStreak(sessions);
  const total = sessions.length;
  const last = sessions[sessions.length-1];
  const hasActive = !!current;
  const activeDone = hasActive ? doneCount(current.progress) : 0;

  let html = `
  <div class="topbar">
    <div class="brand"><span class="ball">🏀</span>Hoops</div>
    <div class="date">${new Date().toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"short"})}</div>
  </div>`;

  // Hero
  html += `<div class="hero"><div class="glow"></div>`;
  if(hasActive){
    html += `
      <h2>Session in progress</h2>
      <div class="big">${activeDone}<span style="font-size:20px;color:var(--muted)"> / ${TOTAL_ACTS} drills</span></div>
      <div class="sub">Picked up where you left off</div>
      <button class="btn-primary" onclick="resumeSession()">▶︎ Resume session</button>`;
  } else {
    const trained = weekHasSession(sessions);
    const greet = streak>0 ? `${streak}-week streak 🔥 — keep it rolling` : "Ready to put in the work?";
    html += `
      <h2>${trained?"Nice — trained this week ✅":"This week's session"}</h2>
      <div class="big">1 Hour · Full Workout</div>
      <div class="sub">${greet}</div>
      <button class="btn-primary" onclick="startSession()">${trained?"＋ Start another session":"▶︎ Start training"}</button>`;
  }
  html += `</div>`;

  // Stats — three across (weekly streak, total sessions, avg completion)
  const avg = sessions.length ? Math.round(sessions.reduce((x,s)=>x+(s.completed/s.total),0)/sessions.length*100) : 0;
  html += `
  <div class="stat-grid three" style="margin-top:14px">
    <div class="stat"><div class="num accent">${streak}<span class="unit">wk${streak===1?"":"s"}</span></div><div class="lbl">Weekly streak</div></div>
    <div class="stat"><div class="num green">${total}</div><div class="lbl">Total sessions</div></div>
    <div class="stat"><div class="num">${avg}<span class="unit">%</span></div><div class="lbl">Avg completion</div></div>
  </div>`;

  // Weekly streak indicator (one tick per calendar week trained)
  html += `<div class="section-label">Weekly streak</div><div class="card">${weekStreakHTML(sessions)}</div>`;

  // Drill time trends — one bar chart per timed drill, scroll down through them
  const chronological = loadSessions();
  const charts = TIMED_CHARTS.map(c=>drillChart(chronological,c.key,c.label)).filter(Boolean).join("");
  html += `<div class="section-label">Drill times</div>`;
  html += charts || `<div class="card"><p style="color:var(--muted);font-size:13.5px;line-height:1.5;margin:0">Your timed-drill charts appear here after your first session — watch your times come down week to week.</p></div>`;

  app.innerHTML = html;
}

function todayHasSession(sessions){ return sessions.some(s=>s.date===todayKey()); }
function todayHasSession(sessions){ return sessions.some(s=>s.date===todayKey()); }

function isoWeek(d){
  const x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(x.getUTCDay()+6)%7; x.setUTCDate(x.getUTCDate()-day+3);
  const firstThu=new Date(Date.UTC(x.getUTCFullYear(),0,4));
  const fday=(firstThu.getUTCDay()+6)%7; firstThu.setUTCDate(firstThu.getUTCDate()-fday+3);
  return 1+Math.round((x-firstThu)/(7*864e5));
}
function weekStreakHTML(sessions){
  const trained=new Set(sessions.map(s=>weekKey(new Date(s.startedAt))));
  const now=new Date(); const day=(now.getDay()+6)%7;
  const thisMon=new Date(now); thisMon.setHours(0,0,0,0); thisMon.setDate(now.getDate()-day);
  const nowKey=weekKey(now);
  let h=`<div class="week-dots">`;
  for(let i=6;i>=0;i--){
    const d=new Date(thisMon); d.setDate(thisMon.getDate()-i*7);
    const key=weekKey(d); const on=trained.has(key); const isThis=key===nowKey;
    h+=`<div class="wd ${on?"on":""} ${isThis?"today":""}"><div class="dot">${on?"✓":""}</div><div class="lab">W${isoWeek(d)}</div></div>`;
  }
  return h+`</div>`;
}

/* timed drills to chart on the home page (lower bars = faster = better) */
const TIMED_CHARTS = [
  { key:"form",      label:"Form shots — make 20" },
  { key:"spots",     label:"Spot shooting — 5 spots total" },
  { key:"rebound",   label:"Rebound lay-ups — 15" },
  { key:"downback",  label:"Baseline to halfway & back" },
  { key:"crossover", label:"Crossover" },
  { key:"speed",     label:"Speed dribbles" },
];
/* pull a chronological [{ts,secs}] series for one drill across saved sessions */
function timeSeries(sessions, key){
  const out=[];
  for(const s of sessions){
    const pr=s.progress; if(!pr) continue;
    let secs=null;
    if(key==="spots"){ const sp=pr.spots; if(sp&&sp.spots&&sp.spots.length&&sp.spots.every(v=>v!=null)) secs=sp.spots.reduce((a,b)=>a+b,0); }
    else { const d=pr[key]; if(d&&d.seconds!=null) secs=d.seconds; }
    if(secs!=null) out.push({ ts:s.startedAt, secs });
  }
  return out;
}
function drillChart(sessions, key, label){
  const series=timeSeries(sessions,key).slice(-8);
  if(!series.length) return "";
  const max=Math.max(...series.map(p=>p.secs));
  const best=Math.min(...series.map(p=>p.secs));
  const latest=series[series.length-1].secs;
  let bars="", xs="";
  for(const p of series){
    const h=Math.max(6, Math.round(p.secs/max*100));
    bars+=`<div class="tbar ${p.secs===best?"best":""}" style="height:${h}%" title="${fmtClock(p.secs)}"></div>`;
    xs+=`<span>${new Date(p.ts).toLocaleDateString(undefined,{day:"numeric",month:"numeric"})}</span>`;
  }
  return `<div class="card chart-card">
    <div class="chart-head"><span class="ct">${label}</span><span class="cmeta">Best ${fmtClock(best)} · Now ${fmtClock(latest)}</span></div>
    <div class="tchart">${bars}</div>
    <div class="chart-x">${xs}</div>
  </div>`;
}

/* =====================================================================
   SESSION FLOW CONTROLS
   ===================================================================== */
function startSession(){
  ensureAudio();
  current = newSession();
  saveCurrent(current);
  view="session"; render();
  window.scrollTo(0,0);
}
function resumeSession(){ ensureAudio(); view="session"; render(); window.scrollTo(0,0); }

function exitSession(){ view="home"; render(); window.scrollTo(0,0); }

function finishSession(){
  const done = doneCount(current.progress);
  showModal({
    title: done<TOTAL_ACTS ? "Finish session?" : "Great work! 🏀",
    body: `You completed ${done} of ${TOTAL_ACTS} drills${sessionMakes(current.progress)?` · ${sessionMakes(current.progress)} makes`:""}. Save this session to your history?`,
    actions: [
      { label:"Save session", cls:"danger", style:"background:linear-gradient(135deg,#FF7A3C,#F2541C)", fn:()=>{
          const sessions=loadSessions();
          const rec={...current, endedAt:Date.now(), completed:done, total:TOTAL_ACTS, makes:sessionMakes(current.progress)};
          sessions.push(rec); saveSessions(sessions);
          current=null; saveCurrent(null);
          cueDone(); vibrate([40,60,40]);
          closeModal(); view="history"; render(); window.scrollTo(0,0);
          toast("Session saved 💪");
        }},
      { label:"Keep training", cls:"neutral", fn:closeModal },
    ]
  });
}
function discardSession(){
  showModal({
    title:"Discard session?",
    body:"This will clear your current progress without saving it. This can't be undone.",
    actions:[
      { label:"Discard", cls:"danger", fn:()=>{ current=null; saveCurrent(null); closeModal(); exitSession(); toast("Session discarded"); }},
      { label:"Cancel", cls:"neutral", fn:closeModal },
    ]
  });
}

/* =====================================================================
   SESSION RENDER
   ===================================================================== */
let sessionTimerInt=null;
function renderSession(){
  const pr=current.progress;
  const done=doneCount(pr);
  const pct=Math.round(done/TOTAL_ACTS*100);

  let html=`
  <div class="sess-head">
    <div class="row1">
      <div class="ttl">Training Session</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="timer" id="sessClock">0:00</span>
        <button class="xbtn" onclick="discardSession()">✕</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-meta"><span>${done} / ${TOTAL_ACTS} drills done</span><span>${pct}%${sessionMakes(pr)?` · ${sessionMakes(pr)} makes`:""}</span></div>
    </div>
  </div>`;

  for(const p of ROUTINE){
    const pDone=p.acts.filter(a=>isActDone(a,pr)).length;
    html+=`<div class="phase-block">
      <div class="phase-title"><span class="em">${p.emoji}</span><span class="tx">${p.name}</span>
        <span class="cnt">${pDone}/${p.acts.length} · ${p.dur}</span></div>`;
    for(const a of p.acts){ html+=renderActivity(a,pr); }
    html+=`</div>`;
  }

  html+=`<div style="height:20px"></div>`;
  app.innerHTML=html;

  // finish bar
  let fb=document.getElementById("finishBar");
  if(!fb){ fb=document.createElement("div"); fb.className="finish-bar"; fb.id="finishBar"; document.body.appendChild(fb); }
  fb.innerHTML=`<button class="btn-primary" style="margin-top:0" onclick="finishSession()">${done===TOTAL_ACTS?"🏁 Finish & save":"Finish session"}</button>`;
  fb.classList.remove("hidden");

  startSessionClock();
}
function removeFinishBar(){ const fb=document.getElementById("finishBar"); if(fb) fb.remove(); }

function startSessionClock(){
  if(sessionTimerInt) clearInterval(sessionTimerInt);
  const el=()=>document.getElementById("sessClock");
  const upd=()=>{ const e=el(); if(!e||!current){ clearInterval(sessionTimerInt); return; } const s=Math.floor((Date.now()-current.startedAt)/1000); e.textContent=fmtClock(s); };
  upd(); sessionTimerInt=setInterval(upd,1000);
}

function renderActivity(a,pr){
  const d=pr[a.id]; const done=isActDone(a,pr);
  let inner=`
    <div class="act ${done?"done":""}" id="act-${a.id}">
      <div class="act-top">
        <div class="act-info">
          <div class="act-name">${a.name}</div>
          ${a.note?`<div class="act-note">${a.note}</div>`:""}
          ${tagFor(a)}
        </div>
        <div class="act-btns">
          ${INFO[a.id]?`<button class="ibtn" onclick="showInfo('${a.id}')" aria-label="How to do it">i</button>`:""}
          <button class="check ${done?"on":""}" onclick="toggleCheck('${a.id}')">✓</button>
        </div>
      </div>`;

  if(a.type==="task"){
    inner+= done
      ? `<button class="cta-btn done" onclick="toggleCheck('${a.id}')"><span>✓ Done · ${a.doneLabel}</span></button>`
      : `<button class="cta-btn" onclick="toggleCheck('${a.id}')"><span>Done · ${a.doneLabel}</span><span class="cta-sub">tap when you've finished them all</span></button>`;
  }
  else if(a.type==="timer"){
    const allDone = d.setsDone>=a.sets;
    inner+= allDone
      ? `<button class="cta-btn done" onclick="openTimer('${a.id}')"><span>✓ Done</span><span class="cta-sub">${a.sets} sets complete · tap to redo</span></button>`
      : `<button class="cta-btn" onclick="openTimer('${a.id}')"><span>⏱ Start</span><span class="cta-sub">${a.sets} × ${a.work}s${a.rest?` · ${a.rest}s rest`:""}${d.setsDone>0?` · ${d.setsDone}/${a.sets} done`:""}</span></button>`;
  }
  else if(a.type==="stopwatch"){
    const goal = a.makes ? `${a.target} makes` : `${a.target} ${a.unit}`;
    inner+= d.seconds!=null
      ? `<button class="cta-btn done" onclick="openStopwatch('${a.id}')"><span>✓ ${fmtClock(d.seconds)}</span><span class="cta-sub">${goal} logged · tap to redo</span></button>`
      : `<button class="cta-btn" onclick="openStopwatch('${a.id}')"><span>⏱ Start · ${goal}</span><span class="cta-sub">times how long it takes you</span></button>`;
  }
  else if(a.type==="spotstime"){
    inner+=`<div class="spot-list">`;
    for(let i=0;i<a.spotCount;i++){
      const t=d.spots[i];
      inner+= t!=null
        ? `<button class="spot-btn done" onclick="openStopwatch('${a.id}',${i})"><span class="sb-l">${a.spotLabels[i]}</span><span class="sb-t">✓ ${fmtClock(t)}</span></button>`
        : `<button class="spot-btn" onclick="openStopwatch('${a.id}',${i})"><span class="sb-l">${a.spotLabels[i]}</span><span class="sb-t">▶ make ${a.perSpot}</span></button>`;
    }
    inner+=`</div>`;
  }
  inner+=`</div>`;
  return inner;
}
function tagFor(a){
  if(a.type==="timer") return `<span class="act-tag">⏱ ${a.sets} × ${a.work}s${a.rest?` · ${a.rest}s rest`:""}</span>`;
  if(a.type==="task") return `<span class="act-tag">🎯 ${a.doneLabel}</span>`;
  if(a.type==="stopwatch") return `<span class="act-tag">⏱ time · ${a.makes?`${a.target} makes`:`${a.target} ${a.unit}`}</span>`;
  if(a.type==="spotstime") return `<span class="act-tag">⏱ ${a.spotCount} spots · make ${a.perSpot} each</span>`;
  return "";
}

/* refresh a single activity card + header without full re-render (keeps scroll) */
function refreshActivity(id){
  const a=ALL_ACTS.find(x=>x.id===id); const pr=current.progress;
  const el=document.getElementById("act-"+id);
  if(el){ const tmp=document.createElement("div"); tmp.innerHTML=renderActivity(a,pr); el.replaceWith(tmp.firstElementChild); }
  refreshProgress();
  saveCurrent(current);
}
function refreshProgress(){
  const pr=current.progress; const done=doneCount(pr); const pct=Math.round(done/TOTAL_ACTS*100);
  const fill=document.querySelector(".progress-fill"); if(fill) fill.style.width=pct+"%";
  const meta=document.querySelector(".progress-meta");
  if(meta) meta.innerHTML=`<span>${done} / ${TOTAL_ACTS} drills done</span><span>${pct}%${sessionMakes(pr)?` · ${sessionMakes(pr)} makes`:""}</span>`;
  // phase counters
  document.querySelectorAll(".phase-block").forEach((blk,idx)=>{
    const p=ROUTINE[idx]; const pDone=p.acts.filter(a=>isActDone(a,pr)).length;
    const cnt=blk.querySelector(".cnt"); if(cnt) cnt.textContent=`${pDone}/${p.acts.length} · ${p.dur}`;
  });
}

/* interactions */
function toggleCheck(id){
  const a=ALL_ACTS.find(x=>x.id===id); const d=current.progress[id];
  const wasDone=isActDone(a,current.progress);
  if(a.type==="check"){ d.done=!d.done; }
  else { d.done=!wasDone; } // manual override
  if(isActDone(a,current.progress)){ cueTick(); vibrate(15); }
  refreshActivity(id);
}
function counter(id,delta){
  const a=ALL_ACTS.find(x=>x.id===id); const d=current.progress[id];
  d.value=Math.max(0,d.value+delta);
  if(delta>0){ cueTick(); vibrate(10); if(d.value===a.target){ d.done=true; cueDone(); vibrate([30,40,30]); } }
  if(d.value<a.target) d.done=false;
  refreshActivity(id);
  bump("act-"+id+" .cval .v");
}
function spotTap(id,i){
  const a=ALL_ACTS.find(x=>x.id===id); const d=current.progress[id];
  d.spots[i]=d.spots[i]>=a.perSpot?0:d.spots[i]+1; // tap fills, tap again when full resets
  cueTick(); vibrate(10);
  if(d.spots.every(v=>v>=a.perSpot)){ d.done=true; cueDone(); vibrate([30,40,30]); }
  else d.done=false;
  refreshActivity(id);
}
function ftTap(id,made){
  const d=current.progress[id];
  d.att++; if(made) d.made++;
  d.done=true; // any logged FT counts as done (cool-down)
  cueTick(); vibrate(10);
  refreshActivity(id);
}
function bump(sel){ const e=document.querySelector("#"+sel.replace(" ",">*")); }

/* =====================================================================
   TIMER OVERLAY
   ===================================================================== */
function openTimer(id){
  ensureAudio();
  const a=ALL_ACTS.find(x=>x.id===id);
  const d=current.progress[id];
  activeTimer={
    actId:id, a, set: d.setsDone, // resume at next set if partial
    phase:"work", remaining:a.work, running:true, raf:null, lastTs:null
  };
  if(activeTimer.set>=a.sets) activeTimer.set=0; // restart if already complete
  renderTimerOverlay();
  cueWork(); vibrate(30);
  runTimer();
}
function runTimer(){
  if(timerInt) clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!activeTimer||!activeTimer.running) return;
    activeTimer.remaining--;
    if(activeTimer.remaining<=3 && activeTimer.remaining>0) cueTick();
    if(activeTimer.remaining<=0){ timerAdvance(); }
    updateTimerOverlay();
  },1000);
}
let timerInt=null;
function timerAdvance(){
  const t=activeTimer, a=t.a;
  if(t.phase==="work"){
    t.set++;
    current.progress[a.id].setsDone=t.set;
    saveCurrent(current);
    if(t.set>=a.sets){ finishTimer(); return; }
    if(a.rest>0){ t.phase="rest"; t.remaining=a.rest; cueRest(); vibrate([20,40]); }
    else { t.phase="work"; t.remaining=a.work; cueWork(); vibrate(30); }
  } else {
    t.phase="work"; t.remaining=a.work; cueWork(); vibrate(30);
  }
}
function finishTimer(){
  if(timerInt) clearInterval(timerInt);
  cueDone(); vibrate([40,60,40,60]);
  const id=activeTimer.actId; activeTimer=null;
  closeTimerOverlay();
  refreshActivity(id);
  toast("Drill complete ✓");
}
function renderTimerOverlay(){
  const root=document.getElementById("overlayRoot");
  const t=activeTimer, a=t.a;
  const setName = a.setLabel? a.setLabel[Math.min(t.set,a.setLabel.length-1)] : `Set ${t.set+1} of ${a.sets}`;
  root.innerHTML=`
  <div class="overlay">
    <div class="ov-head">
      <div class="nm">${a.name}</div>
      <button class="xbtn" onclick="quitTimer()">✕</button>
    </div>
    <div class="ring-wrap">
      <div class="ring">
        <svg width="264" height="264" viewBox="0 0 264 264">
          <circle cx="132" cy="132" r="120" fill="none" style="stroke:var(--surface3)" stroke-width="16"/>
          <circle id="ringProg" cx="132" cy="132" r="120" fill="none" stroke="url(#g)" stroke-width="16"
            stroke-linecap="round" stroke-dasharray="${2*Math.PI*120}" stroke-dashoffset="0"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF7A3C"/><stop offset="1" stop-color="#FFA600"/></linearGradient></defs>
        </svg>
        <div class="center">
          <div class="phase ${t.phase}" id="ovPhase">${t.phase==="work"?"WORK":"REST"}</div>
          <div class="tnum" id="ovNum">${t.remaining}</div>
          <div class="sets" id="ovSets">${setName}</div>
        </div>
      </div>
    </div>
    <div class="ov-ctrls">
      <button onclick="skipTimer()">Skip ›</button>
      <button class="main" id="ovPause" onclick="togglePauseTimer()">Pause</button>
    </div>
  </div>`;
  updateTimerOverlay();
}
function updateTimerOverlay(){
  const t=activeTimer; if(!t) return;
  const a=t.a;
  const num=document.getElementById("ovNum"); if(num) num.textContent=t.remaining;
  const ph=document.getElementById("ovPhase");
  if(ph){ ph.textContent=t.phase==="work"?"WORK":"REST"; ph.className="phase "+t.phase; }
  const setName = a.setLabel? a.setLabel[Math.min(t.set,a.setLabel.length-1)] : `Set ${Math.min(t.set+1,a.sets)} of ${a.sets}`;
  const st=document.getElementById("ovSets"); if(st) st.textContent= t.phase==="rest"? "Rest · next: "+setName : setName;
  const ring=document.getElementById("ringProg");
  if(ring){ const totalT=t.phase==="work"?a.work:a.rest; const frac=t.remaining/totalT;
    ring.style.strokeDashoffset = (2*Math.PI*120)*(1-frac); ring.style.stroke = t.phase==="rest"?"#3B82F6":"url(#g)"; }
}
function togglePauseTimer(){ const t=activeTimer; if(!t) return; t.running=!t.running; document.getElementById("ovPause").textContent=t.running?"Pause":"Resume"; }
function skipTimer(){ if(!activeTimer) return; cueTick(); timerAdvance(); updateTimerOverlay(); }
function quitTimer(){
  if(timerInt) clearInterval(timerInt);
  const id=activeTimer.actId; activeTimer=null;
  closeTimerOverlay(); refreshActivity(id);
}
function closeTimerOverlay(){ document.getElementById("overlayRoot").innerHTML=""; if(timerInt) clearInterval(timerInt); }

/* =====================================================================
   STOPWATCH OVERLAY (count-up — time how long to make N)
   ===================================================================== */
let activeStopwatch=null, swInt=null;
function openStopwatch(id, spotIndex=null){
  ensureAudio();
  const a=ALL_ACTS.find(x=>x.id===id);
  const target = spotIndex!=null ? a.perSpot : a.target;
  const title  = spotIndex!=null ? a.spotLabels[spotIndex] : a.name;
  const step   = spotIndex!=null ? `Spot ${spotIndex+1} of ${a.spotCount}` : "";
  const goal   = spotIndex!=null ? `${target} makes` : (a.makes ? `${target} makes` : `${target} ${a.unit}`);
  activeStopwatch={ actId:id, spotIndex, title, step, target, goal, start:Date.now() };
  renderStopwatchOverlay();
  cueWork(); vibrate(30);
  if(swInt) clearInterval(swInt);
  swInt=setInterval(updateStopwatch,200);
}
function updateStopwatch(){
  if(!activeStopwatch) return;
  const el=document.getElementById("swTime");
  if(el) el.textContent=fmtClock(Math.floor((Date.now()-activeStopwatch.start)/1000));
}
function finishStopwatch(){
  if(!activeStopwatch) return;
  const secs=Math.max(1,Math.round((Date.now()-activeStopwatch.start)/1000));
  const {actId,spotIndex}=activeStopwatch;
  const a=ALL_ACTS.find(x=>x.id===actId);
  const d=current.progress[actId];

  if(spotIndex!=null){
    d.spots[spotIndex]=secs;
    if(d.spots.every(v=>v!=null)) d.done=true;
    saveCurrent(current);
    cueDone(); vibrate([40,60,40]);
    toast(`${a.spotLabels[spotIndex]} · ${fmtClock(secs)}`);
    // jump straight to the next spot still needing makes (no trip back to Train)
    let next=-1;
    for(let i=1;i<=a.spotCount;i++){ const j=(spotIndex+i)%a.spotCount; if(d.spots[j]==null){ next=j; break; } }
    if(next!==-1){ openStopwatch(actId,next); return; }
    if(swInt) clearInterval(swInt); activeStopwatch=null;
    document.getElementById("overlayRoot").innerHTML="";
    refreshActivity(actId);
    return;
  }

  d.seconds=secs; d.done=true;
  if(swInt) clearInterval(swInt); activeStopwatch=null;
  document.getElementById("overlayRoot").innerHTML="";
  cueDone(); vibrate([40,60,40]);
  refreshActivity(actId);
  toast(`Logged · ${fmtClock(secs)}`);
}
function cancelStopwatch(){
  if(swInt) clearInterval(swInt);
  const id=activeStopwatch?activeStopwatch.actId:null; activeStopwatch=null;
  document.getElementById("overlayRoot").innerHTML="";
  if(id) refreshActivity(id);
}
function renderStopwatchOverlay(){
  const t=activeStopwatch;
  document.getElementById("overlayRoot").innerHTML=`
  <div class="overlay">
    <div class="ov-head"><div></div><button class="xbtn" onclick="cancelStopwatch()">✕</button></div>
    <div class="ring-wrap">
      <div style="text-align:center">
        <div class="sw-spot">${t.title}</div>
        ${t.step?`<div class="sw-step">${t.step}</div>`:""}
        <div class="sw-label">${t.goal.toUpperCase()}</div>
        <div class="sw-time" id="swTime">0:00</div>
        <div class="sw-hint">Stop the timer the moment you finish all ${t.goal}</div>
      </div>
    </div>
    <div class="ov-ctrls">
      <button onclick="cancelStopwatch()">Cancel</button>
      <button class="main" onclick="finishStopwatch()">✓ Done</button>
    </div>
  </div>`;
  updateStopwatch();
}

/* =====================================================================
   HISTORY
   ===================================================================== */
function renderHistory(){
  removeFinishBar();
  const sessions=loadSessions().slice().reverse(); // newest first
  let html=`<div class="topbar"><div class="brand"><span class="ball">🏀</span>Sessions</div></div>`;

  if(!sessions.length){
    html+=`<div class="empty"><div class="em">📊</div><p><b>No sessions yet.</b><br>Finish your first training session and your progress will show up here.</p>
      <button class="btn-primary" style="max-width:260px;margin:24px auto 0" onclick="goHome()">Start training</button>
      <button class="btn-ghost" style="max-width:260px;margin:12px auto 0" onclick="importData()">⬆ Import a backup</button></div>`;
    app.innerHTML=html; return;
  }

  // session log
  html+=`<div class="section-label">Session history</div><div class="card" style="padding:4px 16px">`;
  for(const s of sessions){
    const pct=Math.round(s.completed/s.total*100);
    const dur = s.endedAt? fmtDur(s.endedAt-s.startedAt) : "—";
    const ftAct = s.progress.freethrows; const ftPct = ftAct&&ftAct.att? Math.round(ftAct.made/ftAct.att*100):null;
    html+=`<div class="hist-item">
      <div class="hist-ring">${ringSVG(pct)}<div class="pc" style="color:${pct===100?'var(--success)':'var(--accent2)'}">${pct}%</div></div>
      <div class="hist-meta">
        <div class="d">${fmtDate(s.startedAt)}</div>
        <div class="s">${s.completed}/${s.total} drills · ${dur} · ${s.makes||0} makes${ftPct!==null?` · ${ftPct}% FT`:""}</div>
        ${sessionTimesLine(s.progress)?`<div class="s times">${sessionTimesLine(s.progress)}</div>`:""}
      </div>
      <button class="hist-del" onclick="confirmDeleteSession(${s.startedAt})" aria-label="Delete session">${TRASH_SVG}</button>
    </div>`;
  }
  html+=`</div>`;

  // backup
  html+=`<div class="section-label">Backup</div>
    <div class="card">
      <p style="color:var(--muted);font-size:13.5px;line-height:1.5;margin-bottom:14px">Your data is saved only on this device. Export a backup file to keep it safe or move it to another phone.</p>
      <div style="display:flex;gap:10px">
        <button class="btn-ghost" onclick="exportData()">⬇ Export</button>
        <button class="btn-ghost" onclick="importData()">⬆ Import</button>
      </div>
    </div>
    <div style="height:10px"></div>`;
  app.innerHTML=html;
}
function confirmDeleteSession(startedAt){
  const s=loadSessions().find(x=>x.startedAt===startedAt);
  const when = s? fmtFullDate(s.startedAt) : "this session";
  const detail = s? `${s.completed}/${s.total} drills · ${s.makes||0} makes` : "";
  showModal({
    title:"Delete session?",
    body:`Permanently remove your <b>${when}</b> session${detail?` (${detail})`:""} from your history. This can't be undone.`,
    actions:[
      { label:"Delete session", cls:"danger", fn:()=>{ deleteSession(startedAt); closeModal(); render(); toast("Session deleted"); } },
      { label:"Cancel", cls:"neutral", fn:closeModal },
    ]
  });
}
function deleteSession(startedAt){ saveSessions(loadSessions().filter(s=>s.startedAt!==startedAt)); }

/* compact "⏱ Form 1:45 · Spots 3:20 · Lay-ups 1:10" line for a session, if it has timed drills */
function sessionTimesLine(pr){
  if(!pr) return "";
  const parts=[];
  if(pr.form && pr.form.seconds!=null) parts.push(`Form ${fmtClock(pr.form.seconds)}`);
  if(pr.spots && pr.spots.spots){ const done=pr.spots.spots.filter(v=>v!=null); if(done.length) parts.push(`Spots ${fmtClock(done.reduce((x,y)=>x+y,0))}`); }
  if(pr.rebound && pr.rebound.seconds!=null) parts.push(`Lay-ups ${fmtClock(pr.rebound.seconds)}`);
  return parts.length ? "⏱ "+parts.join(" · ") : "";
}
function ringSVG(pct){
  const r=20,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=pct===100?"#34D399":"#FFA600";
  return `<svg width="46" height="46" viewBox="0 0 46 46" style="transform:rotate(-90deg)">
    <circle cx="23" cy="23" r="${r}" fill="none" style="stroke:var(--surface3)" stroke-width="4"/>
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`;
}

function showModal({title,body,actions}){

/* ---------- Info bottom sheet (swipe up/down or tap outside to dismiss) ---------- */
function showInfo(id){
  const a=ALL_ACTS.find(x=>x.id===id); const bullets=INFO[id]; if(!a||!bullets) return;
  const emoji=(ROUTINE.find(p=>p.id===a.phase)||{}).emoji||"🏀";
  const root=document.getElementById("infoRoot");
  root.innerHTML=`
    <div class="sheet-bg" onclick="if(event.target===this)closeInfo()">
      <div class="sheet" id="infoSheet">
        <div class="sheet-grab"></div>
        <div class="sheet-emoji">${emoji}</div>
        <h3>${a.name}</h3>
        <div class="sheet-sub">How to do it</div>
        <ul>${bullets.map(b=>`<li>${b}</li>`).join("")}</ul>
        <button class="sheet-close" onclick="closeInfo()">Got it</button>
      </div>
    </div>`;
  requestAnimationFrame(()=>{ const bg=root.querySelector(".sheet-bg"); if(bg) bg.classList.add("show"); });
  vibrate(8); attachSheetSwipe();
}
function closeInfo(dir){
  const root=document.getElementById("infoRoot"); const bg=root.querySelector(".sheet-bg");
  if(!bg) return; bg.classList.remove("show");
  const sheet=document.getElementById("infoSheet");
  if(sheet){ sheet.style.transition="transform .26s ease-in"; sheet.style.transform="translateY("+(dir<0?"-100%":"100%")+")"; }
  setTimeout(()=>{ root.innerHTML=""; },280);
}
function attachSheetSwipe(){
  const sheet=document.getElementById("infoSheet"); if(!sheet) return;
  let startY=0, dy=0, dragging=false;
  sheet.addEventListener("touchstart",e=>{ startY=e.touches[0].clientY; dy=0; dragging=true; sheet.style.transition="none"; },{passive:true});
  sheet.addEventListener("touchmove",e=>{ if(!dragging) return; dy=e.touches[0].clientY-startY; sheet.style.transform="translateY("+dy+"px)"; },{passive:true});
  sheet.addEventListener("touchend",()=>{ if(!dragging) return; dragging=false;
    if(Math.abs(dy)>70){ closeInfo(dy<0?-1:1); } else { sheet.style.transition="transform .2s ease"; sheet.style.transform="translateY(0)"; } });
}

/* ---------- Export / Import backup ---------- */
function exportData(){
  const sessions=loadSessions();
  const data=JSON.stringify({app:"hoops",version:1,exportedAt:Date.now(),sessions},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="hoops-backup-"+todayKey()+".json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast(sessions.length?`Exported ${sessions.length} session${sessions.length===1?"":"s"}`:"Exported (no sessions yet)");
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      let arr;
      try{ const d=JSON.parse(r.result); arr=Array.isArray(d)?d:d.sessions; if(!Array.isArray(arr)) throw 0; }
      catch(err){ toast("Couldn't read that file"); return; }
      showModal({ title:"Import backup?", body:`Found ${arr.length} session${arr.length===1?"":"s"} in this file. Replace your current data, or merge them in alongside what's already here?`,
        actions:[
          { label:"Replace all", cls:"danger", fn:()=>{ saveSessions(arr); closeModal(); render(); toast(`Imported ${arr.length} session${arr.length===1?"":"s"}`); } },
          { label:"Merge (keep both)", cls:"neutral", fn:()=>{ const merged=mergeSessions(loadSessions(),arr); saveSessions(merged); closeModal(); render(); toast(`Merged — ${merged.length} total`); } },
          { label:"Cancel", cls:"neutral", fn:closeModal },
        ]});
    };
    r.readAsText(f);
  };
  inp.click();
}
function mergeSessions(a,b){ const map=new Map(); [...a,...b].forEach(s=>{ if(s&&s.startedAt!=null) map.set(s.startedAt,s); }); return [...map.values()].sort((x,y)=>x.startedAt-y.startedAt); }

let toastT=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); if(toastT)clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800); }

/* =====================================================================
   INIT
   ===================================================================== */
// clean finish bar on non-session views
const _origRender=render;
render=function(){ if(view!=="session") removeFinishBar(); _origRender(); };

render();

// keep clock alive when returning to tab
document.addEventListener("visibilitychange",()=>{ if(!document.hidden && view==="session") startSessionClock(); });
</script>
